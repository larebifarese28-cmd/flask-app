<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Gemini V24</title>
    <style>
        body { background: #000; color: #00ff00; font-family: sans-serif; text-align: center; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #333; margin: 20px; padding: 10px; background: #111; }
        input { width: 70%; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #00ff00; color: #000; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🐉 DRAGON FINAL FIX</h2>
    <div id="chat"></div>
    <input type="text" id="in" placeholder="اكتب واش تحب...">
    <button onclick="send()">إرسال</button>

    <script>
        async function send() {
            const key = "AIzaSyC_149CAw2tjPoSjAA6KHnpxbVkmj02lzI";
            const txt = document.getElementById("in").value;
            const box = document.getElementById("chat");
            if(!txt) return;

            box.innerHTML += `<div>أنت: ${txt}</div>`;
            // الرابط المستقر للنسخة 1.5 فلاش
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                });
                const data = await res.json();
                
                if (data.candidates) {
                    const replay = data.candidates[0].content.parts[0].text;
                    box.innerHTML += `<div style="color:white">التنين: ${replay}</div>`;
                } else {
                    box.innerHTML += `<div style="color:red">❌ فشل السيرفر: جرب تشغيل VPN لمرة واحدة فقط.</div>`;
                    console.log(data);
                }
            } catch (e) {
                box.innerHTML += `<div style="color:red">❌ مشكل حماية: افتح الملف بمتصفح غير Chrome.</div>`;
            }
        }
    </script>
</body>
</html>
